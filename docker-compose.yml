services:
  #Broker1---------------------------------------------
  kafka1:
    image: apache/kafka:4.1.1
    hostname: kafka1
    container_name: kafka1
    networks:
      my_network:
        ipv4_address: 172.20.0.101
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,EXTERNAL://localhost:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      CLUSTER_ID: 'fEhAzqLPS8aklU4iXPqqbA'
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka1
      KAFKA_OPTS: >-
        -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_config.yml -Dcom.sun.management.jmxremote -Djava.rmi.server.hostname=0.0.0.0 -Dcom.sun.management.jmxremote.port=9999 -Djava.rmi.server.hostname=0.0.0.0
      # -Dcom.sun.management.jmxremote.rmi.port=9999
      # -Dcom.sun.management.jmxremote.authenticate=false
      # -Dcom.sun.management.jmxremote.ssl=false
      # -Djava.rmi.server.hostname=0.0.0.0
    volumes:
      - ./kafka-data1:/var/kafka/data
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_config.yml:/tmp/kafka_config.yml
    ports:
      - "9092:9092" # Kafka broker
      - "8091:8091" # JMX Exporter    
      - "19092:19092" # Kafka external

  #Broker2----------------------------------------------
  kafka2:
    image: apache/kafka:4.1.1
    hostname: kafka2
    container_name: kafka2
    networks:
      my_network:
        ipv4_address: 172.20.0.102
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      CLUSTER_ID: 'fEhAzqLPS8aklU4iXPqqbA'
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka2
      KAFKA_OPTS: >-
        -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_config.yml -Dcom.sun.management.jmxremote -Djava.rmi.server.hostname=0.0.0.0 -Dcom.sun.management.jmxremote.port=9999 -Djava.rmi.server.hostname=0.0.0.0
      # -Dcom.sun.management.jmxremote.rmi.port=9999
      # -Dcom.sun.management.jmxremote.authenticate=false
      # -Dcom.sun.management.jmxremote.ssl=false
      # -Djava.rmi.server.hostname=0.0.0.0
    volumes:
      - ./kafka-data2:/var/kafka/data
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_config.yml:/tmp/kafka_config.yml
    ports:
      - "9093:9092" # Kafka broker
      - "8092:8092" # JMX Exporter
      - "29092:29092" # Kafka external

  #Broker3----------------------------------------------
  kafka3:
    image: apache/kafka:4.1.1
    hostname: kafka3
    container_name: kafka3
    networks:
      my_network:
        ipv4_address: 172.20.0.103
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:39092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092,EXTERNAL://localhost:39092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      CLUSTER_ID: 'fEhAzqLPS8aklU4iXPqqbA'
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka3
      KAFKA_OPTS: >-
        -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_config.yml -Dcom.sun.management.jmxremote -Djava.rmi.server.hostname=0.0.0.0 -Dcom.sun.management.jmxremote.port=9999 -Djava.rmi.server.hostname=0.0.0.0
      # -Dcom.sun.management.jmxremote.rmi.port=9999
      # -Dcom.sun.management.jmxremote.authenticate=false
      # -Dcom.sun.management.jmxremote.ssl=false
      # -Djava.rmi.server.hostname=0.0.0.0
    volumes:
      - ./kafka-data3:/var/kafka/data
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_config.yml:/tmp/kafka_config.yml
    ports:
      - "9094:9092" # Kafka broker
      - "8093:8093" # JMX Exporter
      - "39092:39092" # Kafka external

  #Prometheus----------------------------------------------
  prometheus:
    image: prom/prometheus
    hostname: prometheus
    container_name: prometheus
    networks:
      my_network:
        ipv4_address: 172.20.0.150

    depends_on:
      - kafka1
      - kafka2
      - kafka3
    ports:
      - 9090:9090
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  #Grafana----------------------------------------------
  grafana:
    image: grafana/grafana
    hostname: grafana
    container_name: grafana
    networks:
      my_network:
        ipv4_address: 172.20.0.155
    depends_on:
      - prometheus
    environment:
      GF_PATHS_CONFIG: /etc/grafana/config.ini
    ports:
      - 3000:3000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/config.ini:/etc/grafana/config.ini

  #Redis----------------------------------------------
  redis:
    command: redis-server --appendonly yes
    image: redis:7
    hostname: redis
    container_name: redis
    networks:
      my_network:
        ipv4_address: 172.20.0.110
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  #Kafka Connect----------------------------------------------
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    hostname: kafka-connect
    container_name: kafka-connect
    networks:
      my_network:
        ipv4_address: 172.20.0.120
    depends_on:
      - kafka1
      - kafka2
      - kafka3
      - redis
    ports:
      - "8083:8083"
      - "8094:8094" # JMX Exporter Kafka Connect

    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: connect-cluster

      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3

      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components,/opt/connectors"
      KAFKA_OPTS: >-
        -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8094:/tmp/kafka_connect_config.yml -Djava.rmi.server.hostname=0.0.0.0
    volumes:
      - ./connectors:/opt/connectors
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_connect_config.yml:/tmp/kafka_connect_config.yml

networks:
  my_network:
    name: kafka-network
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
